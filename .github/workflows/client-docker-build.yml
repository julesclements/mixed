name: Build and Push Client Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'client/**' # Trigger only if files in client/ or its Dockerfile/workflow change
      - '.github/workflows/client-docker-build.yml'
  workflow_dispatch: # Allow manual triggering

jobs:
  test:
    name: Run tests with coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Display coverage summary in job summary
        if: always()
        run: |
          echo "## Test & Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            echo "| File | Lines | Statements | Functions | Branches |" >> $GITHUB_STEP_SUMMARY
            echo "|------|-------|-------------|-----------|----------|" >> $GITHUB_STEP_SUMMARY
            node -e "
              const fs = require('fs');
              const data = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
              for (const [file, m] of Object.entries(data)) {
                const name = file.split('/').slice(-2).join('/');
                const fmt = (c) => \`\${c.pct}% (\${c.covered}/\${c.total})\`;
                console.log(\`| \${name} | \${fmt(m.lines)} | \${fmt(m.statements)} | \${fmt(m.functions)} | \${fmt(m.branches)} |\`);
              }
            " >> $GITHUB_STEP_SUMMARY
          else
            echo "Coverage summary not found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  build-and-push-client: # Job name specific to client
    needs: test        # <-- waits for the test job to finish and succeed
    runs-on: ubuntu-latest
    permissions:
      contents: read # Needed to checkout the code

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Client Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./client # Context is the client directory
          file: ./client/Dockerfile # Path to the client's Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ping-client:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ping-client:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/ping-client:${{ github.run_number }}
          # cache-from: type=gha
          # cache-to: type=gha,mode=max
