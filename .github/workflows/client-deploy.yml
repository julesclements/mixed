name: Deploy Client to GitHub Pages

on:
  push:
    paths: # Trigger workflow only if files in 'client/**' or the workflow file itself change
      - 'client/**'
      - '.github/workflows/client-deploy.yml'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build: # This job now handles checkout, build, and artifact upload for the client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client   # <-- applies to all `run:` steps in this job

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Build application
        run: npm run build # This runs: parcel build index.html --dist-dir docs --public-url ./

      - name: Setup Pages
        # This action configures GitHub Pages for deployment.
        uses: actions/configure-pages@v4
        # No working-directory needed here as it operates on repository/GitHub settings

      - name: Display coverage summary in job summary
        if: always()
        run: |
          echo "## Test & Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            echo "| File | Lines | Statements | Functions | Branches |" >> $GITHUB_STEP_SUMMARY
            echo "|------|-------|-------------|-----------|----------|" >> $GITHUB_STEP_SUMMARY
            node -e "
              const fs = require('fs');
              const data = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
              for (const [file, m] of Object.entries(data)) {
                const name = file.split('/').slice(-2).join('/');
                const fmt = (c) => \`\${c.pct}% (\${c.covered}/\${c.total})\`;
                console.log(\`| \${name} | \${fmt(m.lines)} | \${fmt(m.statements)} | \${fmt(m.functions)} | \${fmt(m.branches)} |\`);
              }
            " >> $GITHUB_STEP_SUMMARY
          else
            echo "Coverage summary not found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v7
        with:
          # Path to the directory containing the built files.
          # Parcel builds to 'docs' inside the 'client' directory.
          path: './client/docs'

  deploy:
    needs: build # Depends on the build job to complete successfully
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
